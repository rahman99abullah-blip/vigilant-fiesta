<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Glider</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: #000;
            color: #fff;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(to right, #000428, #004e92);
            cursor: pointer;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .hidden {
            display: none;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff; }
            to { text-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff, 0 0 80px #00ffff; }
        }

        .button {
            padding: 15px 40px;
            font-size: 1.2em;
            background: linear-gradient(45deg, #00ffff, #0080ff);
            border: none;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
            margin: 10px;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.4);
        }

        .button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 255, 255, 0.6);
        }

        .score {
            font-size: 1.5em;
            margin: 10px;
        }

        #gameScore {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2em;
            text-shadow: 0 0 10px #fff;
            z-index: 5;
        }

        .instructions {
            font-size: 1.1em;
            opacity: 0.8;
            margin-top: 20px;
        }
        .Abdullah h2{
            color: white;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2em; }
            .button { padding: 12px 30px; font-size: 1em; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="startScreen" class="screen">
        <div class="Abdullah">
            <h2>ABDULLAH IMRAN</h2>
        </div>
        <h1>SPACE GLIDER</h1>
        <button class="button" onclick="startGame()">START MISSION</button>
        <p class="instructions">Click or Tap to thrust your spaceship</p>
    </div>

    <div id="gameOverScreen" class="screen hidden">
        <h1>MISSION FAILED</h1>
        <p class="score">Final Score: <span id="finalScore">0</span></p>
        <p class="score">Best Score: <span id="bestScore">0</span></p>
        <button class="button" onclick="restartGame()">RETRY MISSION</button>
    </div>

    <div id="gameScore" class="hidden">0</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const gameScoreElement = document.getElementById('gameScore');
        const finalScoreElement = document.getElementById('finalScore');
        const bestScoreElement = document.getElementById('bestScore');

        // Game variables
        let gameStarted = false;
        let gameOver = false;
        let score = 0;
        let bestScore = localStorage.getItem('spaceGliderBest') || 0;

        // Canvas setup
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Ship properties
        const ship = {
            x: canvas.width / 4,
            y: canvas.height / 2,
            width: 40,
            height: 30,
            velocity: 0,
            gravity: 0.4,
            thrust: -8,
            rotation: 0
        };

        // Obstacles
        const obstacles = [];
        const obstacleWidth = 80;
        const gap = 200;
        const obstacleSpeed = 3;

        // Stars background
        const stars = [];
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5 + 0.1
            });
        }

        // Particles
        const particles = [];

        // Audio context for sound effects
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(frequency, duration) {
            if (!audioContext) return;
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        function createObstacle() {
            const gapY = Math.random() * (canvas.height - gap - 100) + 50;
            obstacles.push({
                x: canvas.width,
                gapY: gapY,
                passed: false
            });
        }

        function createParticle(x, y) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 1
                });
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawShip() {
            ctx.save();
            ctx.translate(ship.x + ship.width / 2, ship.y + ship.height / 2);
            ctx.rotate(ship.rotation);
            
            // Ship body
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.moveTo(-20, 0);
            ctx.lineTo(20, -10);
            ctx.lineTo(20, 10);
            ctx.closePath();
            ctx.fill();
            
            // Ship window
            ctx.fillStyle = '#0080ff';
            ctx.beginPath();
            ctx.arc(5, 0, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Thrust effect
            if (ship.velocity < 0) {
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.moveTo(-20, -5);
                ctx.lineTo(-30 - Math.random() * 10, 0);
                ctx.lineTo(-20, 5);
                ctx.closePath();
                ctx.fill();
                
                createParticle(ship.x - 10, ship.y + ship.height / 2);
            }
            
            ctx.restore();
        }

        function drawObstacles() {
            ctx.fillStyle = '#ff00ff';
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 20;
            
            obstacles.forEach(obstacle => {
                // Top obstacle
                ctx.fillRect(obstacle.x, 0, obstacleWidth, obstacle.gapY);
                // Bottom obstacle
                ctx.fillRect(obstacle.x, obstacle.gapY + gap, obstacleWidth, canvas.height);
                
                // Energy field effect
                ctx.strokeStyle = '#ff00ff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(obstacle.x, obstacle.gapY);
                ctx.lineTo(obstacle.x + obstacleWidth, obstacle.gapY);
                ctx.moveTo(obstacle.x, obstacle.gapY + gap);
                ctx.lineTo(obstacle.x + obstacleWidth, obstacle.gapY + gap);
                ctx.stroke();
            });
            
            ctx.shadowBlur = 0;
        }

        function drawStars() {
            ctx.fillStyle = '#ffffff';
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.fillStyle = `rgba(255, 102, 0, ${p.life})`;
                ctx.fillRect(p.x, p.y, 3, 3);
            });
        }

        function updateGame() {
            if (!gameStarted || gameOver) return;
            
            // Update ship
            ship.velocity += ship.gravity;
            ship.y += ship.velocity;
            ship.rotation = ship.velocity * 0.05;
            
            // Update obstacles
            obstacles.forEach((obstacle, index) => {
                obstacle.x -= obstacleSpeed;
                
                // Check scoring
                if (!obstacle.passed && obstacle.x + obstacleWidth < ship.x) {
                    obstacle.passed = true;
                    score++;
                    gameScoreElement.textContent = score;
                    playSound(800, 0.1);
                }
                
                // Remove off-screen obstacles
                if (obstacle.x + obstacleWidth < 0) {
                    obstacles.splice(index, 1);
                }
            });
            
            // Create new obstacles
            if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 300) {
                createObstacle();
            }
            
            // Update stars
            stars.forEach(star => {
                star.x -= star.speed;
                if (star.x < 0) {
                    star.x = canvas.width;
                    star.y = Math.random() * canvas.height;
                }
            });
            
            // Update particles
            updateParticles();
            
            // Check collisions
            if (ship.y < 0 || ship.y + ship.height > canvas.height) {
                endGame();
            }
            
            obstacles.forEach(obstacle => {
                if (ship.x < obstacle.x + obstacleWidth &&
                    ship.x + ship.width > obstacle.x) {
                    if (ship.y < obstacle.gapY || ship.y + ship.height > obstacle.gapY + gap) {
                        endGame();
                    }
                }
            });
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawStars();
            drawParticles();
            
            if (gameStarted && !gameOver) {
                drawObstacles();
                drawShip();
            }
        }

        function gameLoop() {
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function handleInput() {
            if (!gameStarted || gameOver) return;
            ship.velocity = ship.thrust;
            playSound(400, 0.1);
            createParticle(ship.x, ship.y + ship.height / 2);
        }

        function startGame() {
            gameStarted = true;
            gameOver = false;
            score = 0;
            ship.y = canvas.height / 2;
            ship.velocity = 0;
            obstacles.length = 0;
            particles.length = 0;
            
            startScreen.classList.add('hidden');
            gameScoreElement.classList.remove('hidden');
            gameScoreElement.textContent = '0';
            
            createObstacle();
        }

        function endGame() {
            gameOver = true;
            playSound(200, 0.5);
            
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('spaceGliderBest', bestScore);
            }
            
            finalScoreElement.textContent = score;
            bestScoreElement.textContent = bestScore;
            
            setTimeout(() => {
                gameOverScreen.classList.remove('hidden');
            }, 500);
        }

        function restartGame() {
            gameOverScreen.classList.add('hidden');
            gameScoreElement.classList.add('hidden');
            startGame();
        }

        // Event listeners
        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInput();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleInput();
            }
        });

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
